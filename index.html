<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>포트폴리오</title>
  <meta http-equiv="refresh" content="0; url=./src/web/index.html" />
  <script>
    (function () {
      var target = new URL('./src/web/index.html', window.location.href);
      target.search = window.location.search || '';
      target.hash = window.location.hash || '';
      window.location.replace(target.toString());
    })();
  </script>
</head>
<body>
  <p>이동 중입니다… <a id="web-entry-link" href="./src/web/index.html">앱 열기</a></p>
  <script>
    (function () {
      var link = document.getElementById('web-entry-link');
      if (!link) return;
      var target = new URL('./src/web/index.html', window.location.href);
      target.search = window.location.search || '';
      target.hash = window.location.hash || '';
      link.href = target.toString();
    })();
  </script>
</body>
</html>
