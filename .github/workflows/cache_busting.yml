name: Cache Busting

on:
  push:
    branches:
      - main          # main 브랜치에 push할 때 자동 실행
                      # 브랜치명이 다르면 여기를 수정하세요 (예: master)

jobs:
  cache-bust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 현재 날짜+시간을 버전으로 사용 (KST 기준)
      - name: Set version string
        id: version
        run: echo "ver=$(TZ=Asia/Seoul date +'%Y%m%d%H%M')" >> $GITHUB_OUTPUT

      # index.html의 로컬 .js 스크립트에 ?v=버전 자동 삽입
      # CDN(https://)은 건드리지 않음
      - name: Inject version query
        run: |
          VER="${{ steps.version.outputs.ver }}"
          # 기존 ?v=... 제거 후 새 버전 삽입
          sed -i \
            -e 's|\.js?v=[^"]*|.js|g' \
            -e '/src="https:\/\//! s|\.js"|.js?v='"$VER"'"|g' \
            index.html
          echo "✅ 버전 적용: $VER"
          grep "?v=" index.html | head -5

      # 변경된 index.html을 커밋 & push
      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          # 변경사항이 없으면 커밋 스킵
          git diff --cached --quiet || git commit -m "chore: cache bust ?v=${{ steps.version.outputs.ver }}"
          git push
